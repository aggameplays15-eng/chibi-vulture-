<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#EC4899" />
    <meta name="background-color" content="#ffffff" />
    <meta name="description" content="Chibi Vulture - Premium Art Community. Partagez votre art, découvrez des artistes, achetez des produits uniques." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chibi Vulture" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/api/manifest.json" />
    
    <title>Chibi Vulture - Art Community</title>
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https: http:;
      media-src 'self' https:;
      frame-src https://www.youtube.com https://www.youtube-nocookie.com;
      connect-src 'self' https://*.neon.tech wss://*.neon.tech https://api.dicebear.com;
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <!-- Security headers via meta (X-Frame-Options must be set via HTTP header, not meta) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker (production uniquement)
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      } else if ('serviceWorker' in navigator) {
        // En dev : désinscrire tout SW existant pour éviter les interférences
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
    </script>
  </body>
</html>
