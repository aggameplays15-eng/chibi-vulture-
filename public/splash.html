<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chibi Vulture</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #DC2626;
      --red-dark: #8B0000;
      --red-glow: rgba(220, 38, 38, 0.35);
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial Black', 'Segoe UI', sans-serif;
      overflow: hidden;
      position: fixed;
      inset: 0;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Grain texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Red ambient glow ── */
    .glow-bg {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,38,38,0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
    }

    /* ── Main container ── */
    .splash-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Logo block ── */
    .logo-wrapper {
      width: 140px;
      height: 140px;
      background: #0a0a0a;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(220,38,38,0.25);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 30px 80px rgba(0,0,0,0.8),
        0 0 60px var(--red-glow);
      animation: logoFloat 4s ease-in-out infinite;
      margin-bottom: 36px;
    }

    .logo-wrapper svg {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 12px rgba(220,38,38,0.6));
    }

    /* ── Title ── */
    .app-name {
      color: #fff;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 0.85;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .app-name span {
      color: var(--red);
      display: block;
      text-shadow: 0 0 40px var(--red-glow);
    }

    .app-tagline {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 52px;
    }

    /* ── GO button ── */
    .go-btn {
      position: relative;
      width: 200px;
      height: 64px;
      border-radius: 32px;
      background: var(--red);
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #fff;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(220,38,38,0.5),
        0 2px 8px rgba(0,0,0,0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
      animation: btnAppear 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      -webkit-tap-highlight-color: transparent;
    }

    .go-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      border-radius: inherit;
    }

    /* Shimmer sweep */
    .go-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2.5s 1.2s ease-in-out infinite;
    }

    .go-btn:active {
      transform: scale(0.95);
      box-shadow: 0 4px 16px rgba(220,38,38,0.4);
    }

    .go-btn svg {
      transition: transform 0.2s ease;
    }
    .go-btn:active svg {
      transform: translateX(4px);
    }

    /* ── Version ── */
    .version {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      z-index: 1;
    }

    /* ── Decorative lines ── */
    .deco-line {
      position: fixed;
      background: linear-gradient(90deg, transparent, rgba(220,38,38,0.15), transparent);
      height: 1px;
      width: 100%;
      pointer-events: none;
    }
    .deco-line.top    { top: 30%; }
    .deco-line.bottom { bottom: 30%; }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes btnAppear {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }

    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 160%; }
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>
  <div class="deco-line top"></div>
  <div class="deco-line bottom"></div>

  <div class="splash-container">

    <!-- Logo -->
    <div class="logo-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="20" fill="#000"/>
        <text x="50" y="40" text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-size="28" font-weight="900" fill="#DC2626"
          style="filter: drop-shadow(2px 2px 0px #8B0000)">CHIBI</text>
        <text x="50" y="75" text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-size="24" font-weight="900" fill="#DC2626"
          style="filter: drop-shadow(2px 2px 0px #8B0000)">V</text>
      </svg>
    </div>

    <!-- Title -->
    <h1 class="app-name">
      CHIBI
      <span>VULTURE</span>
    </h1>
    <p class="app-tagline">Community for Artists</p>

    <!-- GO button -->
    <button class="go-btn" onclick="handleGo()" aria-label="Entrer dans l'application">
      GO
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

  </div>

  <div class="version">v1.0</div>

  <script>
    function handleGo() {
      const btn = document.querySelector('.go-btn');
      btn.disabled = true;
      btn.style.transform = 'scale(0.93)';
      btn.style.opacity = '0.85';
      btn.innerHTML = '<div class="spinner"></div>';

      // Fade out page then redirect
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.4s ease';
        document.body.style.opacity = '0';
      }, 300);

      setTimeout(() => {
        window.location.href = '/';
      }, 750);
    }
  </script>

</body>
</html>
